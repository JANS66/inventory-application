<div
  id="category-edit-modal"
  class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center p-4 z-50"
>
  <div
    class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 border border-gray-100"
  >
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-xl font-bold text-gray-800">Edit Category Profile</h3>
      <button
        onclick="toggleCategoryEditModal()"
        class="text-gray-400 hover:text-gray-600 font-bold text-lg"
      >
        &times;
      </button>
    </div>

    <form
      id="category-edit-form"
      onsubmit="submitCategoryEditForm(event)"
      class="space-y-4"
    >
      <input type="hidden" id="category-edit-form-id" />

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1"
          >Category Name</label
        >
        <input
          type="text"
          id="category-edit-form-name"
          required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1"
          >Description</label
        >
        <textarea
          id="category-edit-form-description"
          rows="3"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
        ></textarea>
      </div>

      <div class="flex justify-end space-x-3 pt-2">
        <button
          type="button"
          onclick="toggleCategoryEditModal()"
          class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-4 py-2 rounded-lg transition text-sm"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg transition shadow text-sm"
        >
          Update Category
        </button>
      </div>
    </form>
  </div>
</div>
