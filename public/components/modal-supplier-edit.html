<div
  id="supplier-edit-modal"
  class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center p-4 z-50"
>
  <div
    class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 border border-gray-100"
  >
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-xl font-bold text-gray-800">Edit Vendor Profile</h3>
      <button
        onclick="toggleSupplierEditModal()"
        class="text-gray-400 hover:text-gray-600 font-bold text-lg"
      >
        &times;
      </button>
    </div>

    <form
      id="supplier-edit-form"
      onsubmit="submitSupplierEditForm(event)"
      class="space-y-4"
    >
      <input type="hidden" id="supplier-edit-form-id" />

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1"
          >Company / Vendor Name</label
        >
        <input
          type="text"
          id="supplier-edit-form-name"
          required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1"
          >Contact Email Address</label
        >
        <input
          type="email"
          id="supplier-edit-form-email"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1"
          >Phone Number</label
        >
        <input
          type="text"
          id="supplier-edit-form-phone"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"
        />
      </div>

      <div class="flex justify-end space-x-3 pt-2">
        <button
          type="button"
          onclick="toggleSupplierEditModal()"
          class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-4 py-2 rounded-lg transition text-sm"
        >
          Cancel
        </button>
        <button
          type="submit"
          class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg transition shadow text-sm"
        >
          Update Vendor
        </button>
      </div>
    </form>
  </div>
</div>
