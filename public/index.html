<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans">
    <nav class="bg-blue-600 p-4 text-white shadow-md">
      <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wide">
          Central Inventory Command
        </h1>
        <span class="bg-blue-700 px-3 py-1 rounded text-sm font-semibold"
          >Live Database Connected</span
        >
      </div>
    </nav>

    <main class="container mx-auto p-6 max-w-6xl">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-700">Product Catalog</h2>
        <button
          onclick="toggleFormModal()"
          class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold px-4 py-2 rounded-lg transition shadow"
        >
          + Add New Product
        </button>
      </div>

      <div
        class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200"
      >
        <table class="w-full text-left border-collapse">
          <thead class="bg-gray-100 border-b border-gray-200">
            <tr>
              <th class="p-4 font-semibold text-gray-600">SKU</th>
              <th class="p-4 font-semibold text-gray-600">Product Name</th>
              <th class="p-4 font-semibold text-gray-600">Price</th>
              <th class="p-4 font-semibold text-gray-600 text-center">
                Actions
              </th>
            </tr>
          </thead>
          <tbody id="product-table-body">
            <tr>
              <td
                colspan="4"
                class="p-8 text-center text-gray-400 animate-pulse"
              >
                Loading active inventory stream...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script src="app.js"></script>

    <div
      id="product-modal"
      class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center p-4 z-50"
    >
      <div
        class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 border border-gray-100"
      >
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-bold text-gray-800">Add New Product</h3>
          <button
            onclick="toggleFormModal()"
            class="text-gray-400 hover:text-gray-600 font-bold text-lg"
          >
            &times;
          </button>
        </div>

        <form
          id="product-form"
          onsubmit="submitProductForm(event)"
          class="space-y-4"
        >
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-gray-600 mb-1"
                >SKU</label
              >
              <input
                type="text"
                id="form-sku"
                required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-600 mb-1"
                >Price ($)</label
              >
              <input
                type="number"
                step="0.01"
                min="0.01"
                id="form-price"
                required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1"
              >Product Name</label
            >
            <input
              type="text"
              id="form-name"
              required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-gray-600 mb-1"
                >Category</label
              >
              <select
                id="form-category"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
                <option value="">-- No Category --</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-600 mb-1"
                >Supplier</label
              >
              <select
                id="form-supplier"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
                <option value="">-- No Supplier --</option>
              </select>
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1"
              >Description</label
            >
            <textarea
              id="form-description"
              rows="3"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400"
              placeholder="Provide extra product detail logs..."
            ></textarea>
          </div>

          <div class="flex justify-end space-x-3 pt-2">
            <button
              type="button"
              onclick="toggleFormModal()"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-4 py-2 rounded-lg transition text-sm"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold px-4 py-2 rounded-lg transition shadow text-sm"
            >
              Save Product
            </button>
          </div>
        </form>
      </div>
    </div>

    <div
      id="edit-modal"
      class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center p-4 z-50"
    >
      <div
        class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 border border-gray-100"
      >
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-bold text-gray-800">Edit Product Details</h3>
          <button
            type="button"
            onclick="toggleEditModal()"
            class="text-gray-400 hover:text-gray-600 text-2xl font-semibold leading-none"
          >
            &times;
          </button>
        </div>
        <form id="edit-form" onsubmit="submitEditForm(event)" class="space-y-4">
          <input type="hidden" id="edit-form-id" />

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-gray-600 mb-1"
                >SKU (Read-Only)</label
              >
              <input
                type="text"
                id="edit-form-sku"
                disabled
                class="w-full bg-gray-100 border border-gray-300 rounded-lg px-3 py-2 text-gray-500 cursor-not-allowed text-sm"
              />
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-600 mb-1"
                >Price ($)</label
              >
              <input
                type="number"
                step="0.01"
                min="0.01"
                id="edit-form-price"
                required
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"
              />
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1"
              >Product Name</label
            >
            <input
              type="text"
              id="edit-form-name"
              required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm"
            />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-gray-600 mb-1"
                >Category</label
              >
              <select
                id="edit-form-category"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white"
              >
                <option value="">-- No Category --</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-600 mb-1"
                >Supplier</label
              >
              <select
                id="edit-form-supplier"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm bg-white"
              >
                <option value="">-- No Supplier --</option>
              </select>
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1"
              >Description</label
            >
            <textarea
              id="edit-form-description"
              rows="3"
              class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400"
              placeholder="Provide extra product detail logs..."
            ></textarea>
          </div>

          <div class="flex justify-end space-x-3 pt-2">
            <button
              type="button"
              onclick="toggleEditModal()"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-4 py-2 rounded-lg transition text-sm"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg transition shadow text-sm"
            >
              Update Product
            </button>
          </div>
        </form>
      </div>
    </div>

    <div
      id="detail-modal"
      class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center p-4 z-50"
    >
      <div
        class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 border border-gray-100"
      >
        <div class="flex justify-between items-center mb-4 border-b pb-2">
          <h3 id="detail-title" class="text-xl font-bold text-gray-800">
            Product Blueprint
          </h3>
          <button
            type="button"
            onclick="toggleDetailModal()"
            class="text-gray-400 hover:text-gray-600 text-2xl font-semibold leading-none"
          >
            &times;
          </button>
        </div>

        <div class="space-y-3 text-sm">
          <p>
            <span
              class="font-bold text-gray-500 uppercase tracking-wider text-xs"
              >SKU:</span
            >
            <span
              id="detail-sku"
              class="font-mono bg-gray-100 px-2 py-0.5 rounded text-blue-600"
            ></span>
          </p>
          <p>
            <span
              class="font-bold text-gray-500 uppercase tracking-wider text-xs"
              >Category:</span
            >
            <span id="detail-category" class="font-medium text-gray-800"></span>
          </p>
          <p>
            <span
              class="font-bold text-gray-500 uppercase tracking-wider text-xs"
              >Supplier:</span
            >
            <span id="detail-supplier" class="font-medium text-gray-800"></span>
          </p>
          <p>
            <span
              class="font-bold text-gray-500 uppercase tracking-wider text-xs"
              >Description:</span
            >
          </p>
          <p
            id="detail-description"
            class="text-gray-600 bg-gray-50 p-3 rounded-lg italic border border-gray-100"
          ></p>
        </div>

        <div class="mt-6 border-t pt-4">
          <h4 class="font-bold text-gray-700 mb-2">
            Live Inventory Management
          </h4>
          <div
            class="flex items-center justify-between bg-blue-50 p-3 rounded-xl border border-blue-100"
          >
            <div>
              <span class="text-xs text-blue-600 font-semibold uppercase"
                >Current Stock Level</span
              >
              <div id="detail-stock" class="text-2xl font-black text-blue-900">
                0
              </div>
            </div>

            <form
              onsubmit="submitStockPatch(event)"
              class="flex items-center space-x-2"
            >
              <input type="hidden" id="detail-product-id" />
              <input
                type="number"
                id="patch-stock-quantity"
                required
                placeholder="+/- Qty"
                class="w-20 border border-gray-300 rounded-lg px-2 py-1 text-center focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
              <button
                type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-3 py-2 rounded-lg transition shadow"
              >
                Adjust
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
