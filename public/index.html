<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans">
    <nav class="bg-blue-600 p-4 text-white shadow-md">
      <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wide">
          Central Inventory Command
        </h1>
        <span class="bg-blue-700 px-3 py-1 rounded text-sm font-semibold"
          >Live Database Connected</span
        >
      </div>
    </nav>

    <main class="container mx-auto p-6 max-w-6xl">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-700">Product Catalog</h2>
        <button
          onclick="toggleFormModal()"
          class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold px-4 py-2 rounded-lg transition shadow"
        >
          + Add New Product
        </button>
      </div>

      <div
        class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200"
      >
        <table class="w-full text-left border-collapse">
          <thead class="bg-gray-100 border-b border-gray-200">
            <tr>
              <th class="p-4 font-semibold text-gray-600">SKU</th>
              <th class="p-4 font-semibold text-gray-600">Product Name</th>
              <th class="p-4 font-semibold text-gray-600">Price</th>
              <th class="p-4 font-semibold text-gray-600 text-center">
                Actions
              </th>
            </tr>
          </thead>
          <tbody id="product-table-body">
            <tr>
              <td
                colspan="4"
                class="p-8 text-center text-gray-400 animate-pulse"
              >
                Loading active inventory stream...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>

    <script src="app.js"></script>

    <div
      id="product-modal"
      class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center p-4 z-50"
    >
      <div
        class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 border border-gray-100"
      >
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-bold text-gray-800">Add New Product</h3>
          <button
            onclick="toggleFormModal()"
            class="text-gray-400 hover:text-gray-600 font-bold text-lg"
          >
            &times;
          </button>
        </div>

        <form
          id="product-form"
          onsubmit="submitProductForm(event)"
          class="space-y-4"
        >
          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1"
              >SKU</label
            >
            <input
              type="text"
              id="form-sku"
              required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1"
              >Product Name</label
            >
            <input
              type="text"
              id="form-name"
              required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1"
              >Price ($)</label
            >
            <input
              type="number"
              step="0.01"
              min="0.01"
              id="form-price"
              required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div class="flex justify-end space-x-3 pt-2">
            <button
              type="button"
              onclick="toggleFormModal()"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-4 py-2 rounded-lg transition"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold px-4 py-2 rounded-lg transition shadow"
            >
              Save Product
            </button>
          </div>
        </form>
      </div>
    </div>

    <div
      id="edit-modal"
      class="hidden fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center p-4 z-50"
    >
      <div
        class="bg-white rounded-xl shadow-xl max-w-md w-full p-6 border border-gray-100"
      >
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-bold text-gray-800">Edit Product Details</h3>
          <button
            type="button"
            onclick="toggleEditModal()"
            class="text-gray-400 hover:text-gray-600 text-2xl font-semibold leading-none"
          >
            &times;
          </button>
        </div>
        <form id="edit-form" onsubmit="submitEditForm(event)" class="space-y-4">
          <input type="hidden" id="edit-form-id" />
          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1"
              >SKU (Read-Only)</label
            >
            <input
              type="text"
              id="edit-form-sku"
              disabled
              class="w-full bg-gray-100 border border-gray-300 rounded-lg px-3 py-2 text-gray-500 cursor-not-allowed focus:outline-none"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1"
              >Product Name</label
            >
            <input
              type="text"
              id="edit-form-name"
              required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-1"
              >Price ($)</label
            >
            <input
              type="number"
              step="0.01"
              min="0.01"
              id="edit-form-price"
              required
              class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div class="flex justify-end space-x-3 pt-2">
            <button
              type="button"
              onclick="toggleEditModal()"
              class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-4 py-2 rounded-lg transition"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg transition shadow"
            >
              Update Product
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
