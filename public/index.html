<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans">
    <nav class="bg-blue-600 p-4 text-white shadow-md">
      <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wide">
          Central Inventory Command
        </h1>
        <span class="bg-blue-700 px-3 py-1 rounded text-sm font-semibold"
          >Live Database Connected</span
        >
      </div>
    </nav>

    <main class="container mx-auto p-6 max-w-6xl">
      <nav class="flex space-x-2 border-b border-gray-200 mb-6 pb-px">
        <button
          id="tab-products"
          onclick="switchView('products')"
          class="px-5 py-2.5 font-semibold text-sm rounded-t-lg transition border-b-2 border-blue-600 text-blue-600"
        >
          Products Catalog
        </button>
        <button
          id="tab-categories"
          onclick="switchView('categories')"
          class="px-5 py-2.5 font-medium text-sm rounded-t-lg transition text-gray-500 hover:text-gray-700 hover:bg-gray-50 border-b-2 border-transparent"
        >
          Categories
        </button>
        <button
          id="tab-suppliers"
          onclick="switchView('suppliers')"
          class="px-5 py-2.5 font-medium text-sm rounded-t-lg transition text-gray-500 hover:text-gray-700 hover:bg-gray-50 border-b-2 border-transparent"
        >
          Suppliers
        </button>
      </nav>

      <div id="view-products" class="view-panel">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold text-gray-700">Product Catalog</h2>
          <button
            onclick="toggleFormModal()"
            class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold px-4 py-2 rounded-lg transition shadow-sm"
          >
            + Add New Product
          </button>
        </div>

        <div
          class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200"
        >
          <table class="w-full text-left border-collapse">
            <thead class="bg-gray-100 border-b border-gray-200">
              <tr>
                <th class="p-4 font-semibold text-gray-600">SKU</th>
                <th class="p-4 font-semibold text-gray-600">Product Name</th>
                <th class="p-4 font-semibold text-gray-600">Price</th>
                <th class="p-4 font-semibold text-gray-600 text-center">
                  Actions
                </th>
              </tr>
            </thead>
            <tbody id="product-table-body">
              <tr>
                <td
                  colspan="4"
                  class="p-8 text-center text-gray-400 animate-pulse"
                >
                  Loading active inventory stream...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div id="view-categories" class="view-panel hidden">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold text-gray-700">Inventory Categories</h2>
          <button
            onclick="alert('Category creation setup initialization coming')"
            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg transition shadow-sm"
          >
            + Add New Category
          </button>
        </div>
        <div
          class="bg-white rounded-xl shadow-md border border-gray-200 p-8 text-center text-gray-500"
        >
          Categories dashboard data management table loading...
        </div>
      </div>

      <div id="view-suppliers" class="view-panel hidden">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold text-gray-700">Supplier Registry</h2>
          <button
            onclick="alert('Supplier onboarding setup initializing coming')"
            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-4 py-2 rounded-lg transition shadow-sm"
          >
            + Onboard Supplier
          </button>
        </div>
        <div
          class="bg-white rounded-xl shadow-md border border-gray-200 p-8 text-center text-gray-500"
        >
          Suppliers loading...
        </div>
      </div>
    </main>

    <div id="add-modal-container"></div>
    <div id="edit-modal-container"></div>
    <div id="detail-modal-container"></div>

    <script type="module" src="app.js"></script>
  </body>
</html>
